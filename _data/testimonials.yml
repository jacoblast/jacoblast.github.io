- name: "Sarah S."
  text: "Jacob came over and tuned my very special family piano. He took such care to make sure that it sounded amazing, checking every single key and checking the alignment of everything inside. Talking to me about the pedals, etc. It was amazing. The best piano tuner I've ever had. We will definitely use him every time from now on. Highly recommend! And he played some beautiful Scott Joplin after he finished tuning my piano. Mini concert in my house. Thank you for your careful work, Jacob."
  date: "March 2026"

- name: "Michael D."
  text: "I've asked Jacob to do several tunings and some repairs on two pianos in my life, and I've consistently been happy with the results. I'm always more excited to play my piano after it gets Jacob's attention. He's deeply knowledgeable and passionate about both the art and science of tuning and takes many factors into account in his tunings, not just doing what a tuning app says to do, and can tell you exactly what he's doing and why at every step. And he's a great player!"
  date: "March 2026"

# - name: "Lisa S."
  # text: "Our piano sounds better than it has in years. Jacob was kind, knowledgeable, and went above and beyond to both answer our questions and ensure that our instrument sounded amazing. We will happily have him back the next time our piano needs tuning."
  # date: "March 2026"

- name: "TJ T."
  text: "Jacob beautifully tuned my piano and brought the life back into it with a real enthusiasm for the craft, and an ear for it. He is very knowledgeable in the craft & repair of pianos and went above and beyond in explaining what he was doing, why and with wonderful result. Jacob is a pleasure to work with, and graciously came back for a second visit to re-tweak a few keys on my old piano, and declared the second visit was free of charge. An absolute saint of a piano tuner, who truly enjoys the work he is doing. Highly recommend."
  date: "March 2026"