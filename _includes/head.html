<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F4F2EC">
  {% if page.url == '/' %}<link rel="preload" as="image" href="/images/bg-hero-string-scale.png">{% endif %}
  <title>{% if page.layout == 'post' %}{{ page.title }} — Whole Tone Piano Works{% else %}{{ page.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: page.excerpt | strip_html | strip_newlines | truncate: 160 }}">
  <link rel="canonical" href="{{ page.canonical | default: site.url | append: page.url }}">
  <link rel="alternate" type="application/rss+xml" title="Whole Tone Piano Works — From the Bench" href="/feed.xml">

  <!-- Open Graph -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:site_name" content="Whole Tone Piano Works">
  <meta property="og:url" content="{{ page.canonical | default: site.url | append: page.url }}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description | default: page.excerpt | strip_html | strip_newlines | truncate: 160 }}">
  <meta property="og:image" content="{{ site.url }}/images/bg-cta-piano-prism.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }}">
  <meta name="twitter:description" content="{{ page.description | default: page.excerpt | strip_html | strip_newlines | truncate: 160 }}">
  <meta name="twitter:image" content="{{ site.url }}/images/bg-cta-piano-prism.jpg">
  {% if page.layout == 'post' %}
  <meta property="article:published_time" content="{{ page.date | date: '%Y-%m-%dT00:00:00+00:00' }}">
  <meta property="article:author" content="Jacob Last">
  {% endif %}

  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" href="/favicon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Goudy+Bookletter+1911&family=Spectral:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:   '#FBFBF9',
            ink:     '#2F2F2F',
            mid:     '#4A4A4A',
            muted:   '#6F6F6F',
            rule:    '#E6E6E4',
            accent:  '#8A7A55',
          },
          fontFamily: {
            display: ['"Goudy Bookletter 1911"', 'serif'],
            serif:   ['"Spectral"', 'serif'],
            ui:      ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <link rel="stylesheet" href="/styles.css">

</head>
