  <script>
  // ── Hero sequence ──────────────────────────────────
  document.querySelectorAll('.hero-seq').forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), 50 + i * 80);
  });

  // ── Star rating animation ───────────────────────────
  const heroReviews = document.querySelector('.hero-reviews');
  if (heroReviews) {
    const starObs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          setTimeout(() => heroReviews.classList.add('stars-animate'), 300);
          starObs.unobserve(heroReviews);
        }
      });
    }, { threshold: 0.8 });
    starObs.observe(heroReviews);
  }

  // ── Service card wave ───────────────────────────────
  const packageGrid = document.querySelector('.package-grid');
  if (packageGrid) {
    const cardWaveObs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const cards = packageGrid.querySelectorAll('.card-wave');
          cards.forEach((card, i) => {
            setTimeout(() => card.classList.add('in-view'), i * 160);
          });
          cardWaveObs.unobserve(packageGrid);
        }
      });
    }, { threshold: 0.15 });
    cardWaveObs.observe(packageGrid);
  }

  // ── Scroll reveals ─────────────────────────────────
  const revealObs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;
        const delay = el.dataset.delay || 0;
        setTimeout(() => el.classList.add('in-view'), delay);
        revealObs.unobserve(el);
      }
    });
  }, { threshold: 0.10 });

  document.querySelectorAll('.reveal, .string-divider').forEach(el => revealObs.observe(el));

  // ── Header shrink + smart hide on scroll ───────────
  const siteHeader = document.getElementById('site-header');
  let navHidden = false;
  let lastScrollY = 0;

  // ── Hero parallax ───────────────────────────────────
  const heroBg = document.querySelector('.hero-bg');
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    siteHeader.classList.toggle('scrolled', y > 60);
    if (heroBg) heroBg.style.transform = `translateY(${y * 0.28}px)`;

    if (!siteHeader.classList.contains('nav-open')) {
      if (y < 150) {
        if (navHidden) {
          navHidden = false;
          siteHeader.classList.remove('nav-hidden');
        }
      } else if (!navHidden && y > lastScrollY + 5) {
        navHidden = true;
        siteHeader.classList.add('nav-hidden');
      } else if (navHidden && y < lastScrollY - 5) {
        navHidden = false;
        siteHeader.classList.remove('nav-hidden');
      }
    }
    lastScrollY = y;
  }, { passive: true });

  // ── Contact form ────────────────────────────────────
  const contactForm = document.getElementById('contact-form');
  const contactModal = document.getElementById('contact-modal');
  const contactModalClose = document.getElementById('contact-modal-close');

  if (contactForm && contactModal) {
    contactForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(contactForm);
      try {
        const res = await fetch('https://api.web3forms.com/submit', {
          method: 'POST',
          body: data
        });
        if (res.ok) {
          contactForm.reset();
          contactModal.removeAttribute('hidden');
        }
      } catch (_) {}
    });

    contactModalClose.addEventListener('click', () => contactModal.setAttribute('hidden', ''));
    contactModal.addEventListener('click', (e) => {
      if (e.target === contactModal) contactModal.setAttribute('hidden', '');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !contactModal.hasAttribute('hidden')) {
        contactModal.setAttribute('hidden', '');
      }
    });
  }

  // ── FAQ accordion ───────────────────────────────────
  document.querySelectorAll('.faq-trigger').forEach(trigger => {
    trigger.addEventListener('click', () => {
      const item = trigger.closest('.faq-item');
      const body = item.querySelector('.faq-body');
      const isOpen = item.classList.contains('open');
      document.querySelectorAll('.faq-item.open').forEach(open => {
        open.classList.remove('open');
        open.querySelector('.faq-body').style.maxHeight = '';
        open.querySelector('.faq-trigger').setAttribute('aria-expanded', 'false');
      });
      if (!isOpen) {
        item.classList.add('open');
        body.style.maxHeight = body.scrollHeight + 'px';
        trigger.setAttribute('aria-expanded', 'true');
      }
    });
  });
  </script>
